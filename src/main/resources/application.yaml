spring:
  application:
    name: MovieTicketBookingSystem
  datasource:
    url: jdbc:h2:mem:movietickets;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  booking:
    hold-minutes: 10
